# SEBDOM V2 — API en Docker; MongoDB en MongoDB Atlas (MONGODB_URI en .env).
# Uso:
#   Windows:  setup.bat  o  powershell -ExecutionPolicy Bypass -File .\setup.ps1
#   Linux:    ./setup.sh
#   Manual:   docker compose up -d --build
#
# Mongo local en Docker ya no forma parte de este compose. Los datos viven en Atlas.

name: sebdom-v2

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sebdom-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      MONGODB_URI: ${MONGODB_URI:?Defina MONGODB_URI en .env (URI de MongoDB Atlas, ver README)}
      JWT_SECRET: ${JWT_SECRET:-definir_JWT_SECRET_en_archivo_env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-false}
